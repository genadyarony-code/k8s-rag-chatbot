name: Deploy

on:
  push:
    branches: [master]       # Builds image on every master push
    tags:
      - "v*"                 # Deploys to production on semver tags (v1.2.3)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & push Docker image ────────────────────────────────────────────────
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging (master branch) ─────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Apply manifests
        run: kubectl apply -k k8s/ --namespace=k8s-rag-chatbot-staging

      - name: Wait for rollout
        run: kubectl rollout status deployment/chatbot-api -n k8s-rag-chatbot-staging --timeout=5m

      - name: Smoke test
        run: |
          kubectl port-forward -n k8s-rag-chatbot-staging svc/chatbot-api 8000:80 &
          sleep 5
          curl -f http://localhost:8000/healthz/ready

  # ── Deploy to production (semver tags only) ────────────────────────────────
  deploy-production:
    name: Deploy → production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production     # Requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Apply manifests
        run: kubectl apply -k k8s/ --namespace=k8s-rag-chatbot

      - name: Wait for rollout
        run: kubectl rollout status deployment/chatbot-api -n k8s-rag-chatbot --timeout=10m

      - name: Post-deploy health check
        run: |
          kubectl port-forward -n k8s-rag-chatbot svc/chatbot-api 8000:80 &
          sleep 5
          curl -f http://localhost:8000/healthz/ready
          echo "Production deploy succeeded: ${{ github.ref_name }}"
