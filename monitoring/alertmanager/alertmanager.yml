global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "null"  # Replace with "slack" or "email" for real notifications

  routes:
    - match:
        severity: critical
      receiver: "null"
      continue: true

receivers:
  - name: "null"
  # Uncomment and configure to receive real alerts:
  #
  # - name: slack
  #   slack_configs:
  #     - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
  #       channel: "#alerts"
  #       title: "{{ .GroupLabels.alertname }}"
  #       text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
  #
  # - name: email
  #   email_configs:
  #     - to: "oncall@example.com"
  #       from: "alerts@example.com"
  #       smarthost: "smtp.example.com:587"
  #       auth_username: "alerts@example.com"
  #       auth_password: "password"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
